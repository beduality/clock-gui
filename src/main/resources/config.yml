# ClockTime Configuration

# The time format to use.
# Options:
#   "locale" - Auto-detect format based on player's client language (default)
#   "12h"    - Force 12-hour format for all players (e.g., 09:45 PM)
#   "24h"    - Force 24-hour format for all players (e.g., 21:45)
time-format: "locale"

# The fallback language code to use if a player's client language is not supported.
# Options: "en", "es", "pt", "de", etc. (must match a messages_<lang>.properties file).
#
# If set to "en" (default), it falls back to the base languages/messages.properties file.
# If set to another code, players with unsupported languages will get that translation instead.
fallback-language: "en"

name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - src/**
      - build.gradle.kts
      - gradle/libs.versions.toml
      - mkdocs.yml
      - pyproject.toml
      - uv.lock

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      - name: Generate Javadoc
        run: ./gradlew javadoc --no-daemon

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --locked

      - run: uv run mkdocs build

      - name: Copy Javadoc to docs site
        run: cp -r build/docs/javadoc site/apidocs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

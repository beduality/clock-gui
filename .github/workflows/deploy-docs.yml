name: Deploy docs

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml

permissions:
  contents: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
      
      - run: uv sync --locked

      - run: uv run mkdocs gh-deploy --force

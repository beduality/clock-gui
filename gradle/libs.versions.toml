[versions]
paper = "1.20.6-R0.1-SNAPSHOT"
shadow = "8.3.0"
pluginYml = "0.6.0"
junit = "5.10.2"
mockbukkit = "3.93.2"
configurate = "4.2.0"
spotless = "6.25.0"
hangar = "0.1.4"
minotaur = "2.9.0"

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
pluginYml = { id = "net.minecrell.plugin-yml.bukkit", version.ref = "pluginYml" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }

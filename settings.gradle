pluginManagement {
    repositories {
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        gradlePluginPortal()
    }
}

/*
 * This file was generated by the Gradle 'init' task.
 *
 * The settings file is used to specify which projects to include in your build.
 * For more detailed information on multi-project builds, please refer to https://docs.gradle.org/8.9/userguide/multi_project_builds.html in the Gradle documentation.
 */

rootProject.name = 'ClockTime'

include 'clock-time-common'
include 'clock-time-paper'
include 'clock-time-fabric'

project(':clock-time-common').projectDir = file('modules/clock-time-common')
project(':clock-time-paper').projectDir = file('modules/clock-time-paper')
project(':clock-time-fabric').projectDir = file('modules/clock-time-fabric')

site_name: ClockTime
site_description: Localized in-game time displays for Minecraft.
site_url: https://beduality.github.io/clock-time/
repo_url: https://github.com/beduality/clock-time
repo_name: beduality/clock-time
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    - scheme: slate
      primary: deep-purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep-purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/beduality/clock-time
    - icon: fontawesome/brands/discord
      link: https://discord.gg/D5meCv2Wnd

nav:
  - Home: index.md
  - Server Administrators:
    - Tutorials:
      - Installation: server-admins/tutorials/installation.md
      - Quick Start: server-admins/tutorials/quick-start.md
    - How-To Guides:
      - Restricting Clock Usage: server-admins/how-to-guides/restrict-access.md
      - Changing the Fallback Language: server-admins/how-to-guides/change-fallback-language.md
      - Customizing Translations: server-admins/how-to-guides/translations.md
    - Reference:
      - Settings Reference: server-admins/reference/settings.md
      - Permissions Reference: server-admins/reference/permissions.md
      - Translations Reference: server-admins/reference/translations.md
    - Explanation:
      - Language Resolution: server-admins/explanation/language-resolution.md
  - Developers:
    - Tutorials:
      - Building from Source: developers/tutorials/building-from-source.md
    - How-To Guides:
      - Project Dependency Setup: developers/how-to-guides/dependency-setup.md
      - Converting Minecraft Ticks: developers/how-to-guides/converting-ticks.md
      - Querying Translations: developers/how-to-guides/querying-translations.md
    - Reference:
      - API Reference: developers/reference/api.md
    - Explanation:
      - Architecture Overview: developers/explanation/architecture.md
